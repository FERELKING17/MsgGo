name: Android Release

on:
  push:
    branches:
      - master
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew assembleRelease

      - name: Inspect build outputs
        run: |
          echo "=== APK output directory ==="
          ls -al app/build/outputs/apk/release || echo "(none)"
          echo "=== AAB output directory ==="
          ls -al app/build/outputs/bundle/release || echo "(none)"
          echo "=== Full tree for diagnostics ==="
          find app/build/outputs -maxdepth 3 -type f | sed 's|^|  |'

      - name: Sign APK
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.KEYSTORE }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "34.0.0"

      - name: Prepare Release Artifacts
        run: |
          mkdir -p release_artifacts
          find app/build/outputs/apk/release -name "MsgGo-*-signed.apk" | while read -r apk; do
            NEW_NAME=$(basename "$apk" | sed 's/-signed//')
            mv "$apk" "release_artifacts/$NEW_NAME"
          done

      - name: Extract Version Name
        id: version
        run: |
          VERSION_NAME=$(grep 'versionName' app/build.gradle | head -1 | sed 's/.*versionName "\(.*\)"/\1/')
          echo "version=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "Extracted version: $VERSION_NAME"

      # NOTE: automatic tagging was removed per user request.
      # The workflow used to create a Git tag based on the version
      # extracted from `app/build.gradle`.  This step can fail when
      # the runner lacks permission to push tags, or if the tag already
      # exists.  If you prefer to handle tags manually (or they are
      # generated elsewhere), keep it removed.  The release action that
      # follows does not strictly require the tag to exist, it merely
      # uses the `tag_name` input for naming the GitHub release.

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release_artifacts/*.apk
          generate_release_notes: true
          prerelease: false
          tag_name: ${{ steps.version.outputs.tag }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
